<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>KATRAMONEY - Login</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1581091215365-3901e4e2c0c7?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
            background-size: cover;
        }
        .overlay {
            background-color: rgba(0, 0, 0, 0.6);
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .login-container {
            position: relative;
            z-index: 2;
            max-width: 400px;
            margin: 100px auto;
            background-color: rgba(255,255,255,0.95);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
            text-align: center;
        }
        .login-container h2 {
            margin-bottom: 1.5rem;
            color: #003366;
        }
        .login-container input[type='text'],
        .login-container input[type='password'] {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .login-container button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 5px;
            background-color: #003366;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        .login-container button:hover {
            background-color: #0055aa;
        }
        .login-footer {
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        .show-pass {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .show-pass input[type='checkbox'] {
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class='overlay'></div>
    <div class='login-container'>
        <h2>Login to KATRAMONEY</h2>
        <!-- Form directs to /admin after submission -->
        <form action='/admin' method='post'>
            <input type='text' name='username' placeholder='Username' required>
            <input type='password' id='password' name='password' placeholder='Password' required>
            
            <div class='show-pass'>
                <input type='checkbox' id='showPassword' onclick='togglePassword()'>
                <label for='showPassword'>Show Password</label>
            </div>
            
            <button type='submit'>Login</button>
        </form>
        <div class='login-footer'>
            <p>Need help? Call +264 81 000 0000</p>
        </div>
    </div>

    <script>
        function togglePassword() {
            var pwd = document.getElementById('password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
            } else {
                pwd.type = 'password';
            }
        }
    </script>
</body>
</html>
