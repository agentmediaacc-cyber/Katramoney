<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>KATRAMONEY | Customer Signup</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:Inter,sans-serif;background:linear-gradient(135deg,#eef6f2,#f8fafc);display:grid;place-items:center;min-height:100vh;padding:24px}
    .card{width:min(560px,100%);background:#fff;border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 20px 50px rgba(2,12,27,.10);padding:30px}
    h1{margin:0 0 10px;color:#0b3d2e}
    p{color:#64748b;line-height:1.7}
    .field{margin-top:16px}
    label{display:block;margin-bottom:8px;font-size:13px;font-weight:800;color:#64748b;text-transform:uppercase}
    input{width:100%;padding:14px 16px;border:1px solid #e2e8f0;border-radius:14px;font:inherit}
    button{width:100%;margin-top:22px;border:none;border-radius:14px;padding:15px 18px;font-weight:900;background:linear-gradient(135deg,#ffd447,#ffb703);cursor:pointer}
    .err{background:#fee2e2;color:#991b1b;padding:12px;border-radius:12px;margin-top:14px}
    a{color:#0b3d2e;text-decoration:none;font-weight:800}
  </style>
</head>
<body>
  <div class="card">
    <a href="/">← Back to Home</a>
    <h1>Create Your KATRAMONEY Account</h1>
    <p>Create your secure customer account to apply, track progress, upload payments, view messages, and manage your profile.</p>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}

    <form method="POST">
      <input type="hidden" name="next" value="{{ next_url }}">
      <div class="field"><label>Full Name</label><input type="text" name="full_name" required></div>
      <div class="field"><label>Email</label><input type="email" name="email" required></div>
      <div class="field"><label>Phone</label><input type="text" name="phone" required></div>
      <div class="field"><label>Password</label><input type="password" name="password" required></div>
      <div class="field"><label>Confirm Password</label><input type="password" name="confirm_password" required></div>
      <button type="submit">Create Account</button>
    </form>

    <p style="margin-top:18px;">Already registered? <a href="/customer/login?next={{ next_url|urlencode }}">Login here</a></p>
  </div>
</body>
</html>
